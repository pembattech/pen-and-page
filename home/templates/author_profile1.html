{% extends 'base.html' %}

{% block content %}

{% load static %}
<style>
    .author-container {
        margin-top: 8px;
        display: grid;
        grid-template-columns: 1fr 300px;
    }

    p.author-title {
        font-size: 30px;
    }

    .grid-container {
        grid-template-columns: 345px 940px;
    }

    .about-author {
        background: red;
    }

    .card-title {
        font-size: 16px;
    }

    .horizontal-line {
        border-top: 1px solid rgba(0, 0, 0, 0.300);
        margin-top: 10px;
        margin-bottom: 10px;
    }

    .article-item {
        padding: 0;
    }
</style>

<div class="mid-grid">
    <div class="author-container">

        <div class="author-blog-item">
            <p class="author-title">{{blog_author}}</p>

            <div class="article-item">
                {% for blog in blog_obj %}

                <div class="card-body">
                    <div class="card-title">
                        <a class="article-link" href="{% url 'blog_detail' blog.slug %}">{{ blog.title }}</a>
                    </div>

                    <div class="card-text">
                        <p>{{ blog.short_description }}</p>
                    </div>
                    <div class="card-footer">
                        <p><img class="small-image" src="{% static 'image/calendar.png' %}"
                                alt="calendar" />{{blog.created_at.date}}</p>
                        <p><img class="small-image" src="{% static 'image/category.png' %}" alt="category" />{{blog.category }}</p>

                        <div class="readmore">
                            <a class="article-link" href="{% url 'blog_detail' blog.slug %}">Read More</a>
                        </div>
                    </div>











                </div>
                <div class="horizontal-line"></div>
                {% endfor %}
            </div>
        </div>
        <div class="about-author">
            <p>{{blog_author}}</p>
        </div>

    </div>
</div>

</div>
{% endblock %}
