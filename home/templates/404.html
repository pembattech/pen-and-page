<style>
    .navbar ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
      }
      
      .navbar li a {
        display: block;
        color: #000;
        padding: 8px 30px;
        text-decoration: none;
      }
      
      .navbar ul li a {
        color: black;
        text-decoration: none;
        position: relative;
      }
      
      .navbar ul li a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -2px;
        width: 100%;
        height: 2px;
        background-color: blue;
        transform: scaleX(0);
        /* Initially hide the underline */
        transition: transform 0.3s ease-in-out;
        /* Add a smooth transition effect */
      }
      
      .navbar ul li a:hover {
        color: blue;
        /* Change text color to blue on hover */
      }
      
      .navbar ul li.logout-button a {
        color: red;
        /* Change text color to red for the "Logout" link */
      }
      
      .navbar ul li a:hover::after {
        transform: scaleX(1);
        /* Slide in the underline on hover */
      }

      li.logout-button a:hover::after {
        background-color: red;
        /* Change underline color to red on hover for logout link */
      }
      
</style>

<div class="navbar left-grid">
    <ul>
      <li><a href="{% url 'home' %}">Home</a></li>
  
      {% if user.is_authenticated %}
      <li><a href="{% url 'addblog' %}">Add Blog</a></li>
      <li class="logout-button"><a href="{% url 'logout' %}">Logout</a></li>
      {% else %}
      <li><a href="{% url 'login' %}">Add Blog</a></li>
      <li><a href="{% url 'login' %}">Sign in</a></li>
      <li><a href="{% url 'register' %}">Get Started</a></li>
      {% endif %}
    </ul>
  </div>
