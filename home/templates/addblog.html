
{% extends "base.html" %}
{% block title %}{% endblock %}
{% block content %}

<style>
    .mid-grid .entry-container {
        padding: 8px 25px;
        background-color: white;
        border-radius: 5px;
    }

    .input-file-container {
        position: relative;
        width: 225px;
    }

    .input-file-trigger {
        display: block;
        padding: 10px 5px;
        border: 2px solid var(--grey-color);
        border-radius: 5px;
        color: var(--main-color);
        font-size: 1em;
        text-align: center;
        transition: all .4s;
        cursor: pointer;
    }

    .input-file {
        position: absolute;
        top: 0;
        left: 0;
        width: 225px;
        opacity: 0;
        padding: 14px 0;
        cursor: pointer;
    }

    .input-file:hover+.input-file-trigger,
    .input-file:focus+.input-file-trigger,
    .input-file-trigger:hover,
    .input-file-trigger:focus {
        border: 2px solid var(--grey-color);
        border-radius: 5px;
    }

    .file-return {
        margin: 0;
    }

    .file-return:not(:empty) {
        margin: 1em 0;
    }

    .file-return {
        font-style: italic;
        font-size: .9em;
        font-weight: bold;
    }

    .file-return:not(:empty):before {
        content: "Selected file: ";
        font-style: normal;
        font-weight: normal;
    }

    .entry-container-form label {
        position: relative;
        display: block;
    }

    .entry-container-form label textarea {
        height: 100px;
        min-height: 100px;

    }

    .entry-container-form label input,
    .entry-container-form label textarea {
        display: block;
        padding: 20px;
        width: 90%;
        margin-bottom: 10px;
        outline: none;
        border: 0;
        border-radius: 5px;
        transition: all 0.2s ease-in-out;
        background: white;
        font-weight: bold;
        color: black;
    }

    .entry-container-form label input::-moz-placeholder,
    .entry-container-form label textarea::-moz-placeholder {
        transition: all 0.2s ease-in-out;
        color: #D3D3D3;
        font-weight: bold;
    }

    .entry-container-form label input:-ms-input-placeholder,
    .entry-container-form label textarea:-ms-input-placeholder {
        transition: all 0.2s ease-in-out;
        color: #D3D3D3;
        font-weight: bold;
    }

    .entry-container-form label input::placeholder,
    .entry-container-form label textarea::placeholder {
        transition: all 0.2s ease-in-out;
        color: #D3D3D3;
        font-weight: bold;
    }

    .entry-container-form label input:focus,
    .entry-container-form label textarea:focus,
    .entry-container-form label input.populated,
    .entry-container-form label textarea.populated {
        padding-top: 28px;
        padding-bottom: 12px;
    }

    .entry-container-form label input:focus::-moz-placeholder,
    .entry-container-form label textarea:focus::-moz-placeholder,
    .entry-container-form label input:focus::-moz-placeholder,
    .entry-container-form label textarea.populated::-moz-placeholder {
        color: transparent;
    }

    .entry-container-form label input:focus:-ms-input-placeholder,
    .entry-container-form label textarea:focus:-ms-input-placeholder,
    .entry-container-form label input.populated:-ms-input-placeholder,
    .entry-container-form label textarea.populated:-ms-input-placeholder {
        color: transparent;
    }

    .entry-container-form label input:focus::placeholder,
    .entry-container-form label textarea:focus::placeholder,
    .entry-container-form label input.populated::placeholder,
    .entry-container-form label textarea.populated::placeholder {
        color: transparent;
    }

    .entry-container-form label input:focus+span,
    .entry-container-form label textarea:focus+span,
    .entry-container-form label input.populated+span,
    .entry-container-form label textarea.populated+span {
        opacity: 1;
        top: 10px;
    }

    .entry-container-form label span {
        font-size: .8rem;
        font-weight: bold;
        color: #D3D3D3;
        position: absolute;
        top: 0px;
        left: 20px;
        opacity: 0;
        transition: all 0.2s ease-in-out;
    }

    .select {
        position: relative;
    }

    .select svg {
        position: absolute;
        right: 12px;
        top: calc(50% - 3px);
        width: 10px;
        height: 6px;
        stroke-width: 2px;
        stroke: #9098a9;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        pointer-events: none;
    }

    .select select {
        padding: 7px 40px 7px 12px;
        width: 96.5%;
        border: 1px solid #e8eaed;
        border-radius: 5px;
        background: #fff;
        box-shadow: 0 1px 3px -2px #9098a9;
        cursor: pointer;
        font-family: inherit;
        font-size: 16px;
        transition: all 150ms ease;
    }

    .select select:required:invalid {
        color: #5a667f;
    }

    .select select option {
        color: #223254;
    }

    .select select option[value=""][disabled] {
        display: none;
    }

    .select select:focus {
        outline: none;
        border-color: #3fa46a;
    }

    .select select:hover+svg {
        stroke: #3fa46a;
    }

    .button-hold {
        --color: #F6F8FF;
        --background: #0376FF;
        --progress-success: #5C86FF;
        --shadow: rgba(0, 9, 61, 0.2);
        font-size: 16px;
        font-weight: 500;
        line-height: 19px;
        min-width: 112px;
        margin-top: 8px;
        padding: 12px 20px 12px 12px;
        border: 0;
        border-radius: 8px;
        outline: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        cursor: pointer;
        transition: transform 0.3s, box-shadow 0.3s;
        box-shadow: 0 var(--shadow-y, 4px) var(--shadow-blur, 12px) var(--shadow);
        transform: scale(var(--scale, 1)) translateZ(0);
        color: var(--color);
        background: var(--background);
    }

    .button-hold:hover {
        background-color: #006df3;
    }

    .button-hold>div {
        border-radius: 50%;
        display: inline-block;
        vertical-align: top;
        position: relative;
    }

    .button-hold>div:before {
        content: "";
        width: 16px;
        height: 16px;
        z-index: 1;
        position: absolute;
        background: var(--background);
        border-radius: inherit;
        transform: scale(var(--background-scale, 1));
        transition: transform 0.32s ease;
    }

    .button-hold:focus:not(.process),
    .button-hold:hover:not(.process) {
        --shadow-y: 8px;
        --shadow-blur: 16px;
    }

    .button-hold:active:not(.success) {
        --scale: .96;
        --shadow-y: 4px;
        --shadow-blur: 8px;
    }

    .button-hold.process,
    .button-hold.success {
        --progress-array: 52;
        --icon-y: -4px;
        --icon-scale: .6;
        --icon-opacity: 0;
    }

    .button-hold.success {
        --progress-border: none;
        --progress-scale: .11;
        --tick-stroke: var(--progress-success);
        --background-scale: 0;
        --tick-offset: 36;
    }


    @-webkit-keyframes tick {
        100% {
            transform: rotate(-90deg) translate(0, -5px) scale(var(--progress-scale));
        }
    }

    @keyframes tick {
        100% {
            transform: rotate(-90deg) translate(0, -5px) scale(var(--progress-scale));
        }
    }

    .blogform-title {
        font-size: 50px;
        font-weight: 600;
        color: rgb(41, 41, 41);
    }

    .blogform-title::placeholder {
        font-size: 50px;
        font-weight: 600;
        color: rgb(41, 41, 41);
    }
</style>

<div class="mid-grid">
    <div class="entry-container">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="entry-container-form">

                <div class="input-file-container">
                    <input class="blogform-fileupload input-file" name="cover_image" id="my-file" type="file">
                    <label tabindex="0" for="my-file" class="input-file-trigger">Add a cover image</label>
                    <p class="file-return"></p>
                </div>

                {{ form.media}}
                {% for field in form %}
                <div class="form-list">

                    {{ field }}

                </div>
                {% endfor %}

            </div>

            <button class="button-hold" type="submit">Publish</button>
        </form>

    </div>
</div>

<script>
    var fileInput = document.querySelector(".input-file"),
        button = document.querySelector(".input-file-trigger"),
        the_return = document.querySelector(".file-return");

    button.addEventListener("keydown", function (event) {
        if (event.keyCode == 13 || event.keyCode == 32) {
            fileInput.focus();
        }
    });
    button.addEventListener("click", function (event) {
        fileInput.focus();
        return false;
    });
    fileInput.addEventListener("change", function (event) {
        the_return.innerHTML = this.files[0].name;
    });
</script>

{% endblock %}
